<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة المدرّس - نشر التحضيرات</title>
<meta name="color-scheme" content="light">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<style>
  html{background:#FBF7EC;}
  :root{
    --paper:#FBF7EC; --line:#DCD3B8; --ink:#2B2621; --ink-soft:#6B6255;
    --red:#9B2C2C; --gold:#B08A2E; --green:#3F6B4A;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:'Tajawal',sans-serif; color:var(--ink);
    background:var(--paper); min-height:100vh;
  }
  header{
    background:var(--ink); color:var(--paper);
    padding:18px 20px; text-align:center; box-shadow:0 2px 10px rgba(0,0,0,.15);
  }
  header h1{font-family:'Amiri',serif; font-size:1.4rem; margin:0;}
  main{max-width:680px; margin:0 auto; padding:24px 14px 70px;}
  .card{
    background:rgba(255,255,255,.7); border:1px solid var(--line); border-radius:12px;
    padding:20px; margin-bottom:18px; box-shadow:0 2px 8px rgba(43,38,33,.06);
  }
  .card h2{font-family:'Amiri',serif; font-size:1.2rem; margin:0 0 14px;}
  .field{display:flex; flex-direction:column; gap:4px; margin-bottom:12px;}
  .field label{font-size:.82rem; color:var(--ink-soft);}
  input, select, textarea{
    font-family:inherit; font-size:1rem; padding:10px 12px; border:1px solid var(--line);
    border-bottom:2px solid var(--ink); border-radius:6px; background:#fffdf7; color:var(--ink);
    width:100%;
  }
  textarea{min-height:100px; resize:vertical; font-family:inherit;}
  input:focus, select:focus, textarea:focus{outline:none; border-bottom-color:var(--red);}
  button{
    font-family:inherit; cursor:pointer; border:none; border-radius:6px; padding:11px 18px;
    font-size:.95rem; font-weight:700; background:var(--ink); color:var(--paper); width:100%;
    transition:background .15s ease, transform .1s ease;
  }
  button:hover{background:var(--red);}
  button:active{transform:scale(.98);}
  button.small{width:auto; padding:6px 12px; font-size:.78rem;}
  button.link{background:none; color:var(--ink-soft); text-decoration:underline; width:auto; padding:2px 6px; font-weight:400;}
  button.link:hover{color:var(--red); background:none;}
  .errMsg{color:var(--red); font-size:.85rem; margin-top:8px;}
  .assign-pills{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px;}
  .assign-pill{
    padding:8px 16px; border:2px solid var(--line); border-radius:20px; cursor:pointer;
    font-size:.85rem; font-weight:700; background:#fff;
  }
  .assign-pill.selected{border-color:var(--red); color:var(--red); background:#fdf1f1;}
  .post-item{
    border:1px solid var(--line); border-radius:8px; padding:12px 14px; margin-bottom:10px;
    background:#fffdf7;
  }
  .post-item .ptitle{font-weight:700; font-family:'Amiri',serif; font-size:1.05rem;}
  .post-item .pmeta{font-size:.75rem; color:var(--ink-soft); margin:4px 0 8px;}
  .post-item .pcontent{font-size:.9rem; white-space:pre-wrap;}
  .empty{text-align:center; color:var(--ink-soft); padding:20px; font-size:.88rem;}
  #fatalError{display:none; background:#9B2C2C; color:#fff; padding:14px; font-size:.85rem; text-align:center;}
  #loadingMsg{text-align:center; color:var(--ink-soft); padding:30px; font-size:.9rem;}
  .toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--ink);
    color:var(--paper); padding:10px 22px; border-radius:20px; font-size:.85rem; opacity:0;
    transition:opacity .3s, bottom .3s; pointer-events:none; z-index:50;
  }
  .toast.show{opacity:1; bottom:32px;}
</style>
</head>
<body>
<div id="fatalError"></div>
<header><h1>بوابة المدرّس — نشر التحضيرات</h1></header>
<main>
  <div class="card" id="loginCard">
    <h2>دخول المدرّس</h2>
    <form id="loginForm">
      <div class="field"><label>اسم المستخدم</label><input type="text" id="user" required></div>
      <div class="field"><label>كلمة المرور</label><input type="text" id="pass" required></div>
      <button type="submit">دخول</button>
    </form>
    <div class="errMsg" id="errMsg"></div>
  </div>
  <div id="loadingMsg" style="display:none;">جارٍ التحميل...</div>

  <div id="appArea" style="display:none;">
    <div class="card">
      <h2 id="welcomeTitle"></h2>
      <div class="assign-pills" id="assignPills"></div>
    </div>

    <div class="card" id="publishCard" style="display:none;">
      <h2>نشر تحضير جديد</h2>
      <form id="postForm">
        <div class="field"><label>عنوان الدرس</label><input type="text" id="postTitle" required></div>
        <div class="field"><label>التاريخ</label><input type="date" id="postDate" required></div>
        <div class="field"><label>تفاصيل التحضير</label><textarea id="postContent" required></textarea></div>
        <button type="submit">نشر التحضير</button>
      </form>
    </div>

    <div class="card" id="postsListCard" style="display:none;">
      <h2>التحضيرات المنشورة</h2>
      <div id="postsList"></div>
    </div>
  </div>
</main>
<div class="toast" id="toast"></div>

<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCO0u2SSolJAHlkTHu4u3kLP9vJYbP0RG4",
  authDomain: "add-project-74598.firebaseapp.com",
  databaseURL: "https://add-project-74598-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "add-project-74598"
};

window.addEventListener('error', function(e){
  try{
    if(e && e.target && e.target !== window && e.target.tagName) return;
    const box = document.getElementById('fatalError');
    if(box){ box.style.display='block'; box.textContent = 'حدث خطأ: ' + (e.message||'غير معروف'); }
  }catch(err){}
}, true);

function uid(p){ return p+'_'+Date.now()+'_'+Math.random().toString(36).slice(2,7); }
function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str==null?'':String(str);
  return d.innerHTML;
}
function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
const toastEl = document.getElementById('toast');
function toast(msg){ toastEl.textContent=msg; toastEl.classList.add('show'); setTimeout(()=>toastEl.classList.remove('show'),1700); }

try{
  firebase.initializeApp(FIREBASE_CONFIG);
}catch(e){
  document.getElementById('fatalError').style.display='block';
  document.getElementById('fatalError').textContent = 'تعذر الاتصال بقاعدة البيانات: ' + e.message;
}

async function fetchState(){
  const snap = await firebase.database().ref('gradebook_data').once('value');
  return snap.val();
}
async function saveState(state){
  await firebase.database().ref('gradebook_data').update({lessonPosts: state.lessonPosts || []});
}

let currentTeacher = null;
let currentAssignmentIdx = 0;

document.getElementById('loginForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const user = document.getElementById('user').value.trim();
  const pass = document.getElementById('pass').value.trim();
  const errBox = document.getElementById('errMsg');
  errBox.textContent = '';
  document.getElementById('loadingMsg').style.display = 'block';
  try{
    const state = await fetchState();
    document.getElementById('loadingMsg').style.display = 'none';
    if(!state || !state.teachers){
      errBox.textContent = 'تعذر تحميل البيانات، تحقق من الاتصال بالإنترنت.';
      return;
    }
    const teacher = state.teachers.find(t=> t.username===user && t.password===pass);
    if(!teacher){
      errBox.textContent = 'اسم المستخدم أو كلمة المرور غير صحيحة.';
      return;
    }
    if(!teacher.assignments || !teacher.assignments.length){
      errBox.textContent = 'لا توجد لديك أي مادة أو شعبة مكلّف بها بعد. راجع إدارة المدرسة.';
      return;
    }
    currentTeacher = teacher;
    document.getElementById('loginCard').style.display = 'none';
    document.getElementById('appArea').style.display = 'block';
    document.getElementById('welcomeTitle').textContent = 'أهلًا ' + teacher.name;
    document.getElementById('postDate').value = todayStr();
    renderAssignments(state);
  }catch(err){
    document.getElementById('loadingMsg').style.display = 'none';
    errBox.textContent = 'تعذر تحميل البيانات، تحقق من الاتصال بالإنترنت.';
  }
});

function renderAssignments(state){
  const pillsWrap = document.getElementById('assignPills');
  pillsWrap.innerHTML = currentTeacher.assignments.map((a,idx)=>{
    const sub = (state.subjects||[]).find(s=>s.id===a.subjectId);
    const sec = (state.sections||[]).find(s=>s.id===a.sectionId);
    return `<div class="assign-pill ${idx===currentAssignmentIdx?'selected':''}" data-idx="${idx}">
      ${sub?escapeHtml(sub.name):'-'} / ${sec?escapeHtml(sec.name):'-'}
    </div>`;
  }).join('');
  pillsWrap.querySelectorAll('.assign-pill').forEach(p=>{
    p.addEventListener('click', async ()=>{
      currentAssignmentIdx = Number(p.dataset.idx);
      const state = await fetchState();
      renderAssignments(state);
      renderPostsList(state);
    });
  });
  document.getElementById('publishCard').style.display = 'block';
  document.getElementById('postsListCard').style.display = 'block';
  renderPostsList(state);
}

function renderPostsList(state){
  const assignment = currentTeacher.assignments[currentAssignmentIdx];
  const posts = (state.lessonPosts||[]).filter(p=>
    p.teacherId===currentTeacher.id &&
    p.subjectId===assignment.subjectId &&
    p.sectionId===assignment.sectionId
  ).sort((a,b)=> (b.date||'').localeCompare(a.date||''));
  const wrap = document.getElementById('postsList');
  if(!posts.length){ wrap.innerHTML = '<div class="empty">لا توجد تحضيرات منشورة لهذه المادة/الشعبة بعد</div>'; return; }
  wrap.innerHTML = posts.map(p=>`
    <div class="post-item">
      <div class="ptitle">${escapeHtml(p.title)}</div>
      <div class="pmeta">التاريخ: ${escapeHtml(p.date)}</div>
      <div class="pcontent">${escapeHtml(p.content)}</div>
      <button class="link" data-id="${p.id}">حذف</button>
    </div>
  `).join('');
  wrap.querySelectorAll('button.link').forEach(b=>{
    b.addEventListener('click', async ()=>{
      if(!confirm('حذف هذا التحضير؟')) return;
      const state = await fetchState();
      state.lessonPosts = (state.lessonPosts||[]).filter(p=>p.id!==b.dataset.id);
      await saveState(state);
      renderPostsList(state);
      toast('تم حذف التحضير');
    });
  });
}

document.getElementById('postForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const title = document.getElementById('postTitle').value.trim();
  const date = document.getElementById('postDate').value;
  const content = document.getElementById('postContent').value.trim();
  if(!title || !date || !content) return;
  const assignment = currentTeacher.assignments[currentAssignmentIdx];
  try{
    const state = await fetchState();
    if(!state.lessonPosts) state.lessonPosts = [];
    state.lessonPosts.push({
      id: uid('post'), teacherId: currentTeacher.id,
      subjectId: assignment.subjectId, sectionId: assignment.sectionId,
      title, date, content, createdAt: Date.now()
    });
    await saveState(state);
    document.getElementById('postTitle').value = '';
    document.getElementById('postContent').value = '';
    document.getElementById('postDate').value = todayStr();
    renderPostsList(state);
    toast('تم نشر التحضير');
  }catch(err){
    toast('تعذر النشر، تحقق من الاتصال بالإنترنت');
  }
});
</script>
</body>
</html>
