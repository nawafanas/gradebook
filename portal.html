<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة أولياء الأمور - نتيجة الطالب</title>
<meta name="color-scheme" content="light">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<style>
  html{background:#FBF7EC;}
  :root{
    --paper:#FBF7EC; --line:#DCD3B8; --ink:#2B2621; --ink-soft:#6B6255;
    --red:#9B2C2C; --gold:#B08A2E; --green:#3F6B4A;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:'Tajawal',sans-serif; color:var(--ink);
    background:var(--paper); min-height:100vh;
  }
  header{
    background:linear-gradient(135deg, var(--ink) 0%, #3a322a 100%); color:var(--paper);
    padding:20px 20px; text-align:center; box-shadow:0 3px 12px rgba(0,0,0,.2);
  }
  header h1{font-family:'Amiri',serif; font-size:1.5rem; margin:0;}
  main{max-width:600px; margin:0 auto; padding:24px 14px 70px;}
  .card{
    background:rgba(255,255,255,.7); border:1px solid var(--line); border-radius:12px;
    padding:20px; margin-bottom:18px; box-shadow:0 3px 10px rgba(43,38,33,.06);
  }
  .card h2{font-family:'Amiri',serif; font-size:1.25rem; margin:0 0 14px;}
  .field{display:flex; flex-direction:column; gap:4px; margin-bottom:12px;}
  .field label{font-size:.82rem; color:var(--ink-soft);}
  input{
    font-family:inherit; font-size:1rem; padding:10px 12px; border:1px solid var(--line);
    border-bottom:2px solid var(--ink); border-radius:8px; background:#fffdf7; color:var(--ink);
    width:100%; transition:border-color .15s ease, box-shadow .15s ease;
  }
  input:focus{outline:none; border-bottom-color:var(--red); box-shadow:0 0 0 3px rgba(155,44,44,.08);}
  button{
    font-family:inherit; cursor:pointer; border:none; border-radius:8px; padding:12px 18px;
    font-size:.95rem; font-weight:700; background:var(--ink); color:var(--paper); width:100%;
    box-shadow:0 2px 6px rgba(43,38,33,.15); transition:background .15s ease, transform .1s ease;
  }
  button:hover{background:var(--red); box-shadow:0 3px 10px rgba(155,44,44,.25);}
  button:active{transform:scale(.98);}
  table{width:100%; border-collapse:collapse; margin-top:8px; font-size:.85rem; overflow:hidden; border-radius:8px;}
  th, td{border:1px solid var(--line); padding:7px 9px; text-align:center;}
  th{background:#EFE9D8; font-size:.75rem; color:var(--ink-soft); font-weight:700;}
  .icard-row{font-size:.85rem; color:var(--ink-soft); margin-bottom:4px;}
  .tag{display:inline-block; padding:3px 10px; border-radius:12px; font-size:.8rem; font-weight:700;}
  .tag.pass{background:#e3efe5; color:var(--green);}
  .tag.warn{background:#f7ecd8; color:var(--gold);}
  .tag.fail{background:#f6e0e0; color:var(--red);}
  #fatalError{display:none; background:#9B2C2C; color:#fff; padding:14px; font-size:.85rem; text-align:center;}
  #loadingMsg{text-align:center; color:var(--ink-soft); padding:30px; font-size:.9rem;}
  .errMsg{color:var(--red); font-size:.85rem; margin-top:8px;}
  .scan-btn{background:var(--red); margin-bottom:14px;}
  .scan-btn:hover{background:var(--ink);}
  .divider{display:flex; align-items:center; gap:10px; margin:16px 0; color:var(--ink-soft); font-size:.8rem;}
  .divider::before, .divider::after{content:""; flex:1; height:1px; background:var(--line);}
  #scanModal{
    position:fixed; inset:0; background:rgba(20,15,10,.92); z-index:999;
    display:none; align-items:center; justify-content:center; flex-direction:column; padding:20px;
  }
  #scanModal video{width:100%; max-width:420px; border-radius:10px; background:#000;}
  #scanModal p{color:#fff; margin-top:14px; font-size:.9rem;}
  #scanModal button{max-width:200px; margin-top:14px; background:var(--paper); color:var(--ink);}
</style>
</head>
<body>
<div id="fatalError"></div>
<header><h1>بوابة أولياء الأمور — نتيجة الطالب</h1></header>
<main>
  <div class="card" id="loginCard">
    <h2>دخول</h2>
    <button type="button" class="scan-btn" id="btnStartScan">📷 امسح بطاقة الهوية (باركود)</button>
    <div class="divider">أو أدخل يدويًا</div>
    <form id="loginForm">
      <div class="field"><label>اسم المستخدم</label><input type="text" id="user" required></div>
      <div class="field"><label>كلمة المرور</label><input type="text" id="pass" required></div>
      <button type="submit">دخول</button>
    </form>
    <div class="errMsg" id="errMsg"></div>
    <p style="font-size:.75rem; color:var(--ink-soft); margin-top:10px;">هذه بوابة عرض فقط ولا تسمح بأي تعديل على البيانات.</p>
  </div>
  <div id="loadingMsg" style="display:none;">جارٍ التحميل...</div>
  <div class="card" id="studentHeaderCard" style="display:none;"></div>
  <div class="card" id="attendanceCard" style="display:none;"></div>
  <div class="card" id="gradesCard" style="display:none;"></div>
  <div class="card" id="lessonsCard" style="display:none;"></div>
</main>

<div id="scanModal">
  <video id="scanVideo" muted playsinline autoplay></video>
  <p>وجّه الكاميرا نحو الباركود على بطاقة الهوية</p>
  <button type="button" id="btnStopScan">إلغاء</button>
</div>

<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCO0u2SSolJAHlkTHu4u3kLP9vJYbP0RG4",
  authDomain: "add-project-74598.firebaseapp.com",
  databaseURL: "https://add-project-74598-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "add-project-74598"
};

window.addEventListener('error', function(e){
  try{
    if(e && e.target && e.target !== window && e.target.tagName) return;
    const box = document.getElementById('fatalError');
    if(box){ box.style.display='block'; box.textContent = 'حدث خطأ: ' + (e.message||'غير معروف'); }
  }catch(err){}
}, true);

function num(v){ return (v===undefined||v===null||v==='') ? null : Number(v); }
function avg(arr){
  if(arr.some(v=> v===null || v===undefined || isNaN(v))) return null;
  return Math.round((arr.reduce((a,b)=>a+Number(b),0)/arr.length)*100)/100;
}
function calcFasl1(g){ return avg([num(g.m1), num(g.m2)]); }
function calcFasl2(g){ return avg([num(g.m3), num(g.m4)]); }
function calcSaay(g){ return avg([calcFasl1(g), num(g.half), calcFasl2(g)]); }
function calcFinal(g){
  const saay = calcSaay(g); const nb = num(g.notebook);
  if(saay===null || nb===null) return null;
  return avg([saay, nb]);
}
const EXEMPT_GRADES = ['الأول','الثاني','الرابع','الخامس'];
function sectionOf(state, student){ return state.sections.find(s=>s.id===student.sectionId); }
function studentSaayList(state, student){
  return state.subjects.map(s=> calcSaay(student.grades[s.id]||{})).filter(v=> v!==null);
}
function studentExemption(state, student){
  const sec = sectionOf(state, student);
  if(!sec || state.stage!=='ثانوي' || !EXEMPT_GRADES.includes(sec.grade)) return {type:'none'};
  const list = studentSaayList(state, student);
  if(!list.length) return {type:'none'};
  const overall = avg(list);
  const minS = Math.min(...list);
  if(overall===null) return {type:'none'};
  if(overall>=85 && minS!==null && minS>=75) return {type:'عام'};
  if(overall<85){
    const subs = state.subjects.filter(s=>{
      const sv = calcSaay(student.grades[s.id]||{});
      return sv!==null && sv>=90;
    });
    if(subs.length) return {type:'فردي', subjects:subs};
  }
  return {type:'none'};
}
function subjectFinal(student, subject, exemption){
  if(exemption.type==='عام') return {display:'معفى', value:null};
  if(exemption.type==='فردي' && exemption.subjects.some(s=>s.id===subject.id)) return {display:'معفى', value:null};
  const f = calcFinal(student.grades[subject.id]||{});
  return {display: f===null ? '-' : f, value:f};
}
function studentStatus(state, student, exemption){
  if(exemption.type==='عام') return {status:'ناجح', note:'إعفاء عام'};
  const failing = [];
  state.subjects.forEach(sub=>{
    if(exemption.type==='فردي' && exemption.subjects.some(s=>s.id===sub.id)) return;
    const f = calcFinal(student.grades[sub.id]||{});
    if(f!==null && f<50) failing.push(sub.name);
  });
  let status = failing.length===0 ? 'ناجح' : (failing.length<=3 ? 'مكمل' : 'راسب');
  let note = '';
  if(exemption.type==='فردي') note = 'إعفاء فردي: '+exemption.subjects.map(s=>s.name).join('، ');
  if(status==='مكمل') note += (note?' | ':'')+'مكمل: '+failing.join('، ');
  return {status, note};
}
function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str==null?'':String(str);
  return d.innerHTML;
}

let state = null;
try{
  firebase.initializeApp(FIREBASE_CONFIG);
}catch(e){
  document.getElementById('fatalError').style.display='block';
  document.getElementById('fatalError').textContent = 'تعذر الاتصال بقاعدة البيانات: ' + e.message;
}

async function fetchState(){
  const snap = await firebase.database().ref('gradebook_data').once('value');
  return snap.val();
}

document.getElementById('loginForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const user = document.getElementById('user').value.trim();
  const pass = document.getElementById('pass').value.trim();
  const errBox = document.getElementById('errMsg');
  errBox.textContent = '';
  document.getElementById('loadingMsg').style.display = 'block';
  try{
    state = await fetchState();
    document.getElementById('loadingMsg').style.display = 'none';
    if(!state || !state.students){
      errBox.textContent = 'تعذر تحميل البيانات، تحقق من الاتصال بالإنترنت.';
      return;
    }
    const student = state.students.find(s=> s.username===user && s.password===pass);
    if(!student){
      errBox.textContent = 'اسم المستخدم أو كلمة المرور غير صحيحة.';
      return;
    }
    showResult(student);
  }catch(err){
    document.getElementById('loadingMsg').style.display = 'none';
    errBox.textContent = 'تعذر تحميل البيانات، تحقق من الاتصال بالإنترنت.';
  }
});

/* ---------- barcode scan login ---------- */
let zxingControls = null;
let zxingLibPromise = null;
function loadScriptOnce(src){
  return new Promise((resolve)=>{
    const s = document.createElement('script');
    s.src = src;
    s.onload = ()=> resolve(true);
    s.onerror = ()=> resolve(false);
    document.head.appendChild(s);
  });
}
async function loadZXingLib(){
  if(window.ZXingBrowser) return true;
  if(zxingLibPromise) return zxingLibPromise;
  const sources = [
    'https://unpkg.com/@zxing/browser@latest',
    'https://cdn.jsdelivr.net/npm/@zxing/browser@latest',
  ];
  zxingLibPromise = (async ()=>{
    for(const src of sources){
      const ok = await loadScriptOnce(src);
      if(ok && window.ZXingBrowser) return true;
    }
    return false;
  })();
  return zxingLibPromise;
}
document.getElementById('btnStartScan').addEventListener('click', async ()=>{
  const errBox = document.getElementById('errMsg');
  errBox.textContent = '';
  const modal = document.getElementById('scanModal');
  const video = document.getElementById('scanVideo');
  modal.style.display = 'flex';
  errBox.textContent = '';
  const libOk = await loadZXingLib();
  if(!libOk){
    errBox.textContent = 'تعذر تحميل أداة المسح، تحقق من الاتصال بالإنترنت وحاول مجددًا.';
    modal.style.display = 'none';
    return;
  }
  try{
    const codeReader = new ZXingBrowser.BrowserMultiFormatReader();
    zxingControls = await codeReader.decodeFromVideoDevice(undefined, video, (result, err, controls)=>{
      if(result){
        controls.stop();
        modal.style.display = 'none';
        handleScannedId(result.getText());
      }
    });
  }catch(e){
    errBox.textContent = 'تعذر تشغيل الكاميرا: ' + (e.message || 'تأكد من السماح بالوصول للكاميرا');
    modal.style.display = 'none';
  }
});
document.getElementById('btnStopScan').addEventListener('click', ()=>{
  if(zxingControls) zxingControls.stop();
  document.getElementById('scanModal').style.display = 'none';
});

async function handleScannedId(scannedId){
  const errBox = document.getElementById('errMsg');
  document.getElementById('loadingMsg').style.display = 'block';
  try{
    state = await fetchState();
    document.getElementById('loadingMsg').style.display = 'none';
    if(!state || !state.students){
      errBox.textContent = 'تعذر تحميل البيانات، تحقق من الاتصال بالإنترنت.';
      return;
    }
    const student = state.students.find(s=> s.id === scannedId);
    if(!student){
      errBox.textContent = 'لم يتم التعرف على البطاقة. جرّب مرة أخرى أو أدخل البيانات يدويًا.';
      return;
    }
    showResult(student);
  }catch(err){
    document.getElementById('loadingMsg').style.display = 'none';
    errBox.textContent = 'تعذر تحميل البيانات، تحقق من الاتصال بالإنترنت.';
  }
}

/* ---------- auto-login from QR link (?id=...) ---------- */
(function checkAutoLogin(){
  const params = new URLSearchParams(window.location.search);
  const idParam = params.get('id');
  if(idParam){
    handleScannedId(idParam);
  }
})();

function showResult(student){
  document.getElementById('loginCard').style.display = 'none';
  const sec = sectionOf(state, student);
  const exemption = studentExemption(state, student);
  const st = studentStatus(state, student, exemption);
  const tagClass = st.status==='ناجح'?'pass':(st.status==='مكمل'?'warn':'fail');
  const dates = ((state.attendance && state.attendance[student.id]) || []).slice().sort();
  const rel = state.releases || {};

  /* header */
  const headerBox = document.getElementById('studentHeaderCard');
  headerBox.style.display = 'block';
  headerBox.innerHTML = `
    <h2 style="font-family:'Amiri',serif;">${escapeHtml(student.name)}</h2>
    <div class="icard-row">الصف/الشعبة: ${sec?escapeHtml(sec.grade+' - '+sec.name):'-'}</div>
  `;

  /* attendance section */
  const attBox = document.getElementById('attendanceCard');
  attBox.style.display = 'block';
  attBox.innerHTML = `
    <h2>📅 الغياب</h2>
    <div class="icard-row">إجمالي أيام الغياب: <strong>${dates.length}</strong></div>
    ${dates.length ? `
    <table style="margin-top:10px;"><thead><tr><th>#</th><th>تاريخ الغياب</th></tr></thead>
    <tbody>${dates.map((d,i)=>`<tr><td>${i+1}</td><td>${escapeHtml(d)}</td></tr>`).join('')}</tbody></table>
    ` : `<p style="font-size:.85rem; color:var(--ink-soft); margin-top:8px;">لا يوجد أي غياب مسجّل.</p>`}
  `;

  /* grades section */
  const gradesBox = document.getElementById('gradesCard');
  gradesBox.style.display = 'block';
  gradesBox.innerHTML = `
    <h2>📊 الدرجات</h2>
    <div style="overflow-x:auto;">
    <table><thead><tr>
      <th>المادة</th><th>الشهر1</th><th>الشهر2</th><th>الفصل الأول</th><th>نصف السنة</th>
      <th>الشهر3</th><th>الشهر4</th><th>الفصل الثاني</th><th>السعي</th><th>النهائي</th>
    </tr></thead>
    <tbody>${(state.subjects||[]).map(su=>{
      const g = student.grades[su.id]||{};
      const fo = subjectFinal(student, su, exemption);
      const m1v = rel.m1 ? (num(g.m1)??'-') : 'لم تُعتمد';
      const m2v = rel.m2 ? (num(g.m2)??'-') : 'لم تُعتمد';
      const f1v = (rel.m1 && rel.m2) ? (calcFasl1(g)??'-') : 'لم تُعتمد';
      const halfv = rel.half ? (num(g.half)??'-') : 'لم تُعتمد';
      const m3v = rel.m3 ? (num(g.m3)??'-') : 'لم تُعتمد';
      const m4v = rel.m4 ? (num(g.m4)??'-') : 'لم تُعتمد';
      const f2v = (rel.m3 && rel.m4) ? (calcFasl2(g)??'-') : 'لم تُعتمد';
      const saayReady = rel.m1 && rel.m2 && rel.half && rel.m3 && rel.m4;
      const saayv = saayReady ? (calcSaay(g)??'-') : 'لم تُعتمد';
      const finalv = (saayReady && rel.notebook) ? fo.display : 'لم تُعتمد';
      return `<tr><td style="text-align:right;">${escapeHtml(su.name)}</td>
      <td>${m1v}</td><td>${m2v}</td><td>${f1v}</td>
      <td>${halfv}</td><td>${m3v}</td><td>${m4v}</td>
      <td>${f2v}</td><td>${saayv}</td><td>${finalv}</td></tr>`;
    }).join('')}</tbody></table>
    </div>
    ${(rel.m1 && rel.m2 && rel.half && rel.m3 && rel.m4 && rel.notebook) ? `
    <p style="margin-top:12px;">الحالة: <span class="tag ${tagClass}">${st.status}</span></p>
    <p style="font-size:.85rem; color:var(--ink-soft);">${escapeHtml(st.note||'')}</p>
    ` : `<p style="margin-top:12px; font-size:.85rem; color:var(--ink-soft);">الحالة النهائية تظهر بعد اعتماد جميع الفترات من إدارة المدرسة.</p>`}
  `;

  /* lesson posts (تحضيرات) section */
  const lessonsBox = document.getElementById('lessonsCard');
  const posts = (state.lessonPosts||[]).filter(p=> p.sectionId === student.sectionId)
    .sort((a,b)=> (b.date||'').localeCompare(a.date||''));
  lessonsBox.style.display = 'block';
  lessonsBox.innerHTML = `
    <h2>📚 التحضيرات</h2>
    ${posts.length ? posts.map(p=>{
      const sub = (state.subjects||[]).find(s=>s.id===p.subjectId);
      return `<div style="border:1px solid var(--line); border-radius:8px; padding:10px 14px; margin-bottom:10px; background:#fffdf7;">
        <div style="font-weight:700; font-family:'Amiri',serif;">${escapeHtml(p.title)}</div>
        <div style="font-size:.75rem; color:var(--ink-soft); margin:4px 0 8px;">${sub?escapeHtml(sub.name):''} — ${escapeHtml(p.date)}</div>
        <div style="font-size:.88rem; white-space:pre-wrap;">${escapeHtml(p.content)}</div>
      </div>`;
    }).join('') : `<p style="font-size:.85rem; color:var(--ink-soft);">لا توجد تحضيرات منشورة بعد.</p>`}
  `;
}
</script>
</body>
</html>
